version: "3"
services:
  postgres:
    restart: always
    image: postgres:17.9
    ports:
      - "54328:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data/
    environment:
      - POSTGRES_DB=diogramos_dev
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_MULTIPLE_EXTENSIONS=postgis,hstore,postgis_topology
volumes:
  pgdata: {}
