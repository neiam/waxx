apiVersion: stackgres.io/v1
kind: SGCluster
metadata:
  name: postgres
  namespace: waxx
spec:
  instances: 1
  postgres:
    version: '17'
    # Waxx uses :citext on users.email (case-insensitive uniqueness).
    # The first migration runs `CREATE EXTENSION IF NOT EXISTS citext`
    # but StackGres will only let it succeed if the extension binaries
    # are made available to the cluster, which is what this list does.
    extensions:
      - name: citext
  pods:
    persistentVolume:
      size: '100Gi'
