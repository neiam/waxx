# Example app-level secret for the waxx deployment.
#
# Postgres credentials are NOT in here — they're managed by StackGres
# and pulled from the `postgres` Secret in the waxx namespace (the
# SGCluster from pg.yml). This file only carries the application's own
# secret_key_base and the Erlang distribution cookie.
#
# Generate the secret_key_base with:
#
#     mix phx.gen.secret
#
# Or, if you don't have Mix on the host:
#
#     openssl rand -base64 64 | tr -d '\n'
#
# Don't commit the populated copy — copy this file to `app-secrets.yml`
# and add it to .gitignore (or rely on the existing `secret.yml` pattern).

apiVersion: v1
kind: Secret
metadata:
  name: elixir-args
  namespace: waxx
type: Opaque
stringData:
  # `mix phx.gen.secret` output. 64+ bytes of base64 entropy.
  secret_key_base: "REPLACE_ME_with_64_bytes_of_base64_entropy_from_mix_phx_gen_secret"

  # Erlang distribution cookie — every replica must agree on this. Any
  # 32+ char random string works.
  #
  #   openssl rand -hex 32
  #
  erlang_cookie: "REPLACE_ME_with_a_long_random_string"

  # Sentry DSN — copy from your project at https://sentry.io/settings/.../keys/.
  # Leave the line out (or set the Secret key empty) to disable reporting;
  # the `optional: true` flag in app.yml means the pod still starts.
  sentry_dsn: "https://PUBLIC_KEY@oXXXXXXX.ingest.sentry.io/PROJECT_ID"
